# ===========================================================================
# Keep Haul API alive on Hugging Face Spaces
# Pings /health every 6 hours to prevent 48-hour inactivity sleep.
# ===========================================================================

name: Keep Backend Alive

on:
  schedule:
    # Every 6 hours: midnight, 6am, noon, 6pm UTC
    - cron: '0 */6 * * *'
  workflow_dispatch:  # Allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Haul API health endpoint
        run: |
          echo "Pinging Haul API..."
          HTTP_STATUS=$(curl -sf -o /dev/null -w "%{http_code}" ${{ secrets.BACKEND_URL }}/health || echo "000")
          echo "Response status: $HTTP_STATUS"
          if [ "$HTTP_STATUS" = "200" ]; then
            echo "✅ Backend is healthy"
          else
            echo "⚠️ Backend returned status $HTTP_STATUS (may be waking up)"
          fi
